<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Native Intelligence</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body { width: 340px; }
    .ni-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .ni-logo { display: flex; align-items: center; gap: 8px; }
    .ni-logo-mark {
      width: 28px; height: 28px; background: var(--accent);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; font-weight: 700;
      font-family: 'Nunito', sans-serif; font-weight: 800;
    }
    .ni-logo-text { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: -0.01em; }
    .open-sidebar-btn {
      font-size: 11px; padding: 5px 10px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: none; color: var(--text-secondary); cursor: pointer;
      transition: all var(--transition);
    }
    .open-sidebar-btn:hover { border-color: var(--accent); color: var(--accent); }
    .ni-body { padding: 14px 16px 16px; }
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
    .quick-card {
      padding: 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-lg); background: var(--surface);
      cursor: pointer; transition: all var(--transition); text-align: center;
    }
    .quick-card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
    .quick-card .qc-icon { font-size: 22px; margin-bottom: 5px; }
    .quick-card .qc-title { font-size: 12px; font-weight: 600; }
    .quick-card .qc-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .recent-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .clear-btn { font-size: 10px; background: none; border: none; color: var(--text-muted); cursor: pointer; }
    .clear-btn:hover { color: var(--ai-color); }
    #popup-history { max-height: 180px; overflow-y: auto; }
  </style>
</head>
<body>
  <header class="ni-header">
    <div class="ni-logo">
      <img src="mascot/logo_transparent.png" style="width:32px;height:32px;object-fit:contain;border-radius:6px;flex-shrink:0;" alt="NI"/>
      <span class="ni-logo-text">Native Intelligence</span>
    </div>
    <button class="open-sidebar-btn" id="open-sidebar">Open panel →</button>
  </header>
  <div class="ni-body">
    <div class="quick-actions">
      <div class="quick-card" id="quick-verify">
        <div class="qc-icon">🔍</div>
        <div class="qc-title">Verify Text</div>
        <div class="qc-sub">AI or Human?</div>
      </div>
      <div class="quick-card" id="quick-source">
        <div class="qc-icon">📎</div>
        <div class="qc-title">Find Source</div>
        <div class="qc-sub">Detect origin</div>
      </div>
    </div>
    <div class="recent-label">
      <span class="section-label">Recent checks</span>
      <button class="clear-btn" id="clear-history">Clear all</button>
    </div>
    <div id="popup-history">
      <div class="empty-state"><div class="icon">📋</div>No checks yet</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
